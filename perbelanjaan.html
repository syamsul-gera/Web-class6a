<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>perbelanjaan</title>
  <style>
    body {
      padding: 0;
      margin: 0;
      background: linear-gradient(#9afbec, #d7fbfa);
    }
        @keyframes animasi2 {
      from{
        scale: 0;
      }
      to{
        scale: 1;
      }
    }
    @keyframes animasi {
      from{
        rotate(0)
        
      }
      to{
        rotate(180)
      }
    }
    .text {
      justify-content: center;
            color: black;
      text-align: center;
      background-color: yellow;
      padding: 20px;
      margin: 300px auto;
      border-radius: 10px;
      animation-name: animasi2;
      animation-duration: 3s;
    }
    .text p {
      font-weight: bold;
    }
    button {
      text-align: left;
      background: transparent;
      backdrop-filter: blur(10px);
      width: 60px;
      border-radius: 60%;
      margin-right: 100px;
      animation-name: animasi2;
      animation-duration: 3s;
    }
    .nav {
      display: flex;
     
    }
  </style>
</head>
<body>
  <div class="nav">
    <button onclick="alert('COMING SOON')"><img src="acount.png" width="100%" alt="" ></button>
  </div>
  <div class="text">
      <h1 >🚀COMING SOON🚀</h1>
  <p>Stay tune</p>
  </div>

</body>
</html>
